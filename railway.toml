[build]
builder = "nixpacks"
buildCommand = "pip install -r requirements.txt && python data/generate_maintenance_log.py && python -m rul.train"

[deploy]
startCommand = "sh -c 'uvicorn main:app --host 0.0.0.0 --port $PORT'"
healthcheckPath = "/docs"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
